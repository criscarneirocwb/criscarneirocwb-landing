<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristiano Carneiro | cwb.me</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #5a5a5a;
            --cursor-color: #ffffff;
            --meta-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        .terminal {
            width: 90%;
            max-width: 650px;
            padding: 2rem;
        }

        .meta-header {
            text-align: center;
            margin-bottom: 4rem;
            opacity: 0;
            transform: translateY(-20px);
            animation: dropIn 1s ease forwards, pulse 4s infinite 1s;
        }

        .meta-title {
            font-size: 2.8rem;
            font-weight: bold;
            color: var(--meta-color);
            letter-spacing: 0.5rem;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .meta-subtitle {
            font-size: 0.85rem;
            color: var(--accent-color);
            letter-spacing: 0.3rem;
            margin-top: 0.5rem;
            transition: opacity 0.5s ease;
        }

        @keyframes dropIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
            50% { text-shadow: 0 0 25px rgba(255, 255, 255, 0.5); }
        }

        .line {
            margin-bottom: 0.8rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.5s ease forwards;
        }

        .delay-1 { animation-delay: 0.8s; }
        .delay-2 { animation-delay: 1.6s; color: var(--accent-color); font-size: 0.9em; }
        .delay-3 { animation-delay: 2.4s; }

        .prompt::before {
            content: "guest@criscarneirocwb.me:~$ ";
            color: var(--accent-color);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--cursor-color);
            vertical-align: middle;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
            opacity: 0;
            animation-delay: 3.2s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #hidden-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            cursor: default;
        }
        
        .lang-fade {
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="meta-header">
            <div class="meta-title">[ META_CÓRTEX ]</div>
            <div class="meta-subtitle" id="lang-subtitle">SISTEMA OPERATIVO COGNITIVO</div>
        </div>

        <div class="line delay-1 prompt">whoami</div>
        <div class="line delay-2" id="lang-loading">Carregando perfil público...</div>
        <div class="line delay-3">
            > Cristiano Carneiro<br>
            > <span class="lang-fade" id="lang-eng">Engenharia Orientada à Redução de Entropia</span><br>
            > <span class="lang-fade" id="lang-status">Status: Daemons loaded and running...</span><span class="cursor" id="active-cursor"></span>
        </div>
    </div>

    <div id="hidden-trigger"></div>

    <script>
        // Dicionário de Estado
        const dict = {
            pt: {
                subtitle: "SISTEMA OPERATIVO COGNITIVO",
                loading: "Carregando perfil público...",
                eng: "Engenharia Orientada à Redução de Entropia",
                status: "Status: Daemons loaded and running..."
            },
            en: {
                subtitle: "COGNITIVE OPERATING SYSTEM",
                loading: "Loading public profile...",
                eng: "Entropy Reduction Oriented Engineering",
                status: "Status: Daemons loaded and running..."
            }
        };

        let currentLang = 'pt';
        const elements = {
            subtitle: document.getElementById('lang-subtitle'),
            loading: document.getElementById('lang-loading'),
            eng: document.getElementById('lang-eng'),
            status: document.getElementById('lang-status')
        };

        // Alternador de Idioma a cada 6 segundos
        setInterval(() => {
            // Efeito de fade out
            Object.values(elements).forEach(el => el.style.opacity = 0);
            
            setTimeout(() => {
                currentLang = currentLang === 'pt' ? 'en' : 'pt';
                const langData = dict[currentLang];
                
                elements.subtitle.textContent = langData.subtitle;
                elements.loading.textContent = langData.loading;
                elements.eng.textContent = langData.eng;
                elements.status.textContent = langData.status;
                
                // Efeito de fade in
                Object.values(elements).forEach(el => el.style.opacity = 1);
            }, 500); // Tempo de espera para o texto trocar enquanto está invisível
        }, 6000);

        // Gatilho do Getulio Protocol
        document.getElementById('hidden-trigger').addEventListener('dblclick', function() {
            const cursor = document.getElementById('active-cursor');
            cursor.style.display = 'none';
            
            const terminal = document.querySelector('.terminal');
            const authLine = document.createElement('div');
            authLine.className = 'line prompt';
            authLine.style.marginTop = '1.5rem';
            authLine.style.color = '#ffaa00';
            authLine.innerHTML = 'init getulio_protocol... <br>[ ERROR: Handshake criptográfico ausente. ]<span class="cursor" style="opacity:1; animation-delay:0s;"></span>';
            
            terminal.appendChild(authLine);
        });
    </script>
</body>
</html>
